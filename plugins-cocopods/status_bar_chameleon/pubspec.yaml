name: status_bar_chameleon
description: "Plugin to show/hide the status bar on iOS/Android"
version: 1.0.0
homepage: https://github.com/githubstuff/icodeforyou_package
resolution: workspace

environment:
  sdk: ^3.11.1
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0

flutter:
  plugin:
    platforms:
      android:
        package: com.icodeforyou.status_bar_chameleon
        pluginClass: StatusBarChameleonPlugin
      ios:
        pluginClass: StatusBarChameleonPlugin
