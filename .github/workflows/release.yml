name: "Release Tag Builder"

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Release Artifacts
        run: |
          melos bootstrap
          melos run build

      - name: Upload Release Artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/build/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
