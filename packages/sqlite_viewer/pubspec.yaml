name: sqlite_viewer
description: A Flutter widget for displaying SQLite query results in a spreadsheet-style view.
version: 1.0.0+1
resolution: workspace
publish_to: "none"

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  edittext_popover: ^0.2.1
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  fpdart: ^1.2.0
  sqflite: ^2.4.2

dev_dependencies:
  bloc_test: ^10.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  very_good_analysis: ^10.2.0
 
flutter:
  uses-material-design: true
