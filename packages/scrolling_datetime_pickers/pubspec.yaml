# pubspec.yaml

name: scrolling_datetime_pickers
description: Apple-style scrolling datetime picker widgets for Flutter with smooth animations and customizable styling.
version: 1.0.0
homepage: https://github.com/yourusername/scrolling_datetime_pickers
publish_to: none
resolution: workspace

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  cupertino_icons: ^1.0.6
  equatable: ^2.0.5
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  intl: ^0.20.2

dev_dependencies:
  bloc_test: ^10.0.0
  build_runner: ^2.4.9
  coverage: ^1.7.2
  flutter_test:
    sdk: flutter
  mockito: ^5.6.4
  test: ^1.25.0
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true