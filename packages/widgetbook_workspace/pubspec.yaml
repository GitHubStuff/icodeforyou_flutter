name: widgetbook_workspace
description: "Flutter widget book"
publish_to: 'none'
version: 0.1.1
resolution: workspace

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  gap: ^3.0.1
  analog_clock_widget:
    path: ../analog_clock_widget
  animated_checkbox_widget:
    path: ../animated_checkbox_widget
  edittext_popover:
    path: ../edittext_popover
  extensions:
    path: ../extensions
  scrolling_datetime_pickers:
    path: ../scrolling_datetime_pickers
  since_when:
    path: ../since_when
  sqlite_viewer:
    path: ../sqlite_viewer
  step_slider_package:
    path: ../step_slider_package
  theme_package:
    path: ../theme_package
  widgetbook: ^3.20.2
  widgetbook_annotation: ^3.9.0

dev_dependencies:
  build_runner: ^2.7.0   # dart run build_runner build --delete-conflicting-outputs
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mockito: ^5.5.1
  widgetbook_generator: ^3.20.1


flutter:
  uses-material-design: true
