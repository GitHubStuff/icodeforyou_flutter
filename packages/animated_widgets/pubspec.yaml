# animated_widgets/pubspec.yaml

name: animated_widgets
description: A collection of animated Flutter widgets including grow, grow+fade, and animated checkbox effects.
version: 1.0.0
resolution: workspace
publish_to: none

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  custom_widgets: ^1.0.0
  equatable: ^2.0.8
  extensions: ^1.0.4
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  theme_manager: ^1.0.0

dev_dependencies:
  bloc_test: ^10.0.0
  fake_async: ^1.3.3
  flutter_test:
    sdk: flutter
  icodeforyou_lints: ^1.0.0

flutter:
  uses-material-design: true
