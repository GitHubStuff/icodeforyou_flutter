version: 1.0.0
resolution: workspace
publish_to: none

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  custom_widgets: ^1.0.0
  equatable: ^2.0.8
  flutter:
    sdk: flutter
