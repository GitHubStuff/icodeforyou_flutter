name: data_grid
description: >-
  A horizontally scrolling, schemaless data grid for query results
  (List<Map<String, Object?>>). Tri-state sortable column headers,
  pinned header row, single-line ellipsized cells with tap-to-inspect
  popover, and theme-aware spreadsheet-style grid lines.
version: 1.0.0
publish_to: none

resolution: workspace

environment:
  sdk: ">=3.12.0 <4.0.0"

dependencies:
  extensions: ^1.0.4
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0

flutter: