  theme_manager: 
    path: ../../packages/theme_manager
  theme_widget:
    path: ../../packages/theme_widget

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.2.0

flutter:
  uses-material-design: true