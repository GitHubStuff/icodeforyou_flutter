name: theme_service
description: "Allows for theme control to be used in a service"
version: 0.0.1
resolution: workspace
publish_to: "none"

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  overlay_host:
    path: ../../packages/overlay_host
  service_locator:
