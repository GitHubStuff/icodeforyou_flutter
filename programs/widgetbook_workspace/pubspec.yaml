name: widgetbook_workspace
description: "Flutter widget book"
publish_to: 'none'
version: 0.1.2
resolution: workspace

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  adaptive_modal:
    path: ../../packages/adaptive_modal
  analog_clock_widget:
    path: ../../packages/analog_clock_widget
  animated_rail_menu:
    path: ../../packages/animated_rail_menu
  animated_widgets:
