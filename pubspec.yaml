          fi
        )

    test_programs_coverage:
      description: Run tests with coverage in all programs (excludes widgetbook_workspace)
      run: |
        echo "🧪 Running program coverage tests..."
        for program_dir in programs/*/; do
          program_name=$(basename "$program_dir")

          if [ -d "${program_dir}test" ]; then
            echo ""
            echo "🚀 Testing $program_name..."
            cd "$program_dir"
            flutter test --coverage
            cd - > /dev/null
          else
            echo "⏭️  Skipping $program_name (no test directory)"
          fi
