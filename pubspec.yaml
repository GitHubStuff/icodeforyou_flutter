            open coverage/programs_html/index.html
          else
            echo "⚠️  HTML file wasn't created"
            lcov --summary coverage/programs_lcov.info
          fi
        else
          echo "❌ No program coverage files found. Run 'melos run test_programs_coverage' first."
        fi
    # ─── COVERAGE ─────────────────────────────────────────────────────────────

    coverage_merge_all:
      description: Merge coverage from all packages + plugins + programs into coverage/all_html/
      run: |
        mkdir -p coverage
        rm -f coverage/all_lcov.info

        coverage_files=$(find . -path "./coverage" -prune -o -name "lcov.info" -path "*/coverage/lcov.info" -not -path "*/widgetbook_workspace/*" -print)

        if [ -n "$coverage_files" ]; then
          echo "Found coverage files:"
          echo "$coverage_files"

          for lcov_file in $coverage_files; do
            source_path=$(echo "$lcov_file" | sed 's|^\./||' | sed 's|/coverage/lcov\.info$||')

            echo "Processing coverage for $source_path..."

            temp_file="coverage/temp_$(echo "$source_path" | tr '/' '_').info"
            sed "s|SF:lib/|SF:${source_path}/lib/|g" "$lcov_file" > "$temp_file"

            if [ -f coverage/all_lcov.info ]; then
              lcov --add-tracefile coverage/all_lcov.info --add-tracefile "$temp_file" -o coverage/all_lcov.info
            else
              cp "$temp_file" coverage/all_lcov.info
            fi

            rm "$temp_file"
          done

          lcov --remove coverage/all_lcov.info \
            '*/lib/src/_app_settings_entry.dart' \
            -o coverage/all_lcov.info \
            --ignore-errors unused

          genhtml coverage/all_lcov.info -o coverage/all_html --ignore-errors source
          echo "✅ Merged full workspace coverage report: coverage/all_html/index.html"

          if [ -f coverage/all_html/index.html ]; then
            open coverage/all_html/index.html
          else
            echo "⚠️  HTML file wasn't created"
            lcov --summary coverage/all_lcov.info
          fi
        else
          echo "❌ No coverage files found. Run 'melos run test_coverage' and/or 'melos run test_programs_coverage' first."
        fi

    # ─── WIDGETBOOK ───────────────────────────────────────────────────────────

    widgetbook:
      description: Run widgetbook for development
      run: |
        cd programs/widgetbook_workspace
        flutter run -d chrome

    widgetbook_build:
      description: Build widgetbook components
      run: |
        cd programs/widgetbook_workspace
        dart run build_runner build --delete-conflicting-outputs
        echo "✅ Widgetbook build completed"

    widgetbook_clean:
      description: Clean widgetbook generated files
      run: |
        cd programs/widgetbook_workspace
        dart run build_runner clean
        echo "🧹 Widgetbook generated files cleaned"

    # ─── UTILITIES ────────────────────────────────────────────────────────────

    list_packages:
      description: List all packages and programs in workspace
      run: |
        echo "📦 Workspace packages:"
        find . -name "pubspec.yaml" -not -path "./pubspec.yaml" -exec dirname {} \; | sort
