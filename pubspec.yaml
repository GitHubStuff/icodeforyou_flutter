# pubspec.yaml icodeforyou_flutter
name: icodeforyou_flutter
publish_to: none
description: Collection of flutter packages
version: 9.0.0

workspace:
  - packages/abstractions
  - packages/adaptive_modal
  - packages/analog_clock_widget
  - packages/animated_rail_menu
  - packages/animated_widgets
  - packages/application_startup
  - packages/edittext_popover
  - packages/extensions
  - packages/my_logger
  - packages/overlay_host
  - packages/random_color_generator
  - packages/platform_utils
  - packages/scrolling_datetime_pickers
  - packages/settings_widget
  - packages/since_when
  - packages/since_when_widgets
  - packages/sqlite_viewer
  - packages/step_slider_package
  - packages/tag_chip
  - packages/theme_manager
  - packages/theme_service
  - packages/theme_widget
  - plugins/statusbar
  - programs/startup_demo
  - programs/widgetbook_workspace

environment:
  sdk: ">=3.11.0 <4.0.0"

# dependency_overrides:
#   test_api: 0.7.9

dev_dependencies:
  melos: ^7.4.1

flutter:
  uses-material-design: true

melos:
  scripts:
    analyze:
      run: dart analyze .

    analyze_all:
      description: Analyze all packages
      exec: dart analyze .

    build:
      description: Run build_runner in packages that need it
      exec: dart run build_runner build --delete-conflicting-outputs
      packageFilters:
        dependsOn: "build_runner"

    # ─── COVERAGE CLEAN ───────────────────────────────────────────────────────

    coverage_clean:
      description: Clean all coverage data from entire workspace (packages + programs)
      run: |
        rm -rf coverage/
        find . -name "coverage" -type d -not -path "./coverage" -exec rm -rf {} +
        echo "🧹 Coverage data cleaned from entire workspace"

    # ─── PACKAGES ─────────────────────────────────────────────────────────────

    test_package:
      description: |
        Run tests and coverage for a single package.
        Usage: PKG=package_name melos test_package
        Example: PKG=since_when melos test_package
      run: |
        (
          if [ -z "$PKG" ]; then
            echo "❌ PKG is not set. Usage: PKG=package_name melos test_package"
            exit 1
          fi

          package_dir="packages/$PKG"

          if [ ! -d "$package_dir" ]; then
            echo "❌ Package '$PKG' not found at $package_dir"
            exit 1
          fi

          if [ ! -d "${package_dir}/test" ]; then
            echo "❌ No test directory found in $package_dir"
            exit 1
          fi

          echo ""
          echo "📦 Testing $PKG..."
          cd "$package_dir"

          if grep -q "flutter:" pubspec.yaml; then
            echo "🦋 Flutter package — running flutter test"
            flutter test --coverage
          else
            echo "🎯 Dart package — running dart test"
            dart test --coverage=coverage
          fi

          cd - > /dev/null
          echo ""
          echo "✅ Done: $PKG"
        )

    test_all:
      description: |
        Run tests in all packages sequentially to avoid Flutter lock conflicts.
        Usage: melos test_all
        Fail-fast: STRICT=true melos test_all
      run: |
        (
          echo "🧪 Running tests sequentially to avoid Flutter lock conflicts..."
          if [ "${STRICT}" = "true" ]; then
            echo "⚠️  STRICT mode — stopping on first failure"
          fi

          failed_packages=""
          ignored_packages=0
          total_packages=0
          tested_packages=0

          for package_dir in packages/*/; do
            package_name=$(basename "$package_dir")

            if [ -d "${package_dir}test" ]; then
              echo ""
              echo "📦 Testing $package_name..."
              cd "$package_dir"
              total_packages=$((total_packages + 1))
              tested_packages=$((tested_packages + 1))

              if ! flutter test; then
                echo "❌  Tests failed in $package_name"
                cd - > /dev/null
                if [ "${STRICT}" = "true" ]; then
                  echo ""
                  echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                  echo "🛑 STRICT mode — stopping at $package_name"
                  echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                  exit 1
                fi
                if [ -z "$failed_packages" ]; then
                  failed_packages="$package_name"
                else
                  failed_packages="$failed_packages, $package_name"
                fi
              else
                cd - > /dev/null
              fi
            else
              echo "⏭️  Skipping $package_name (no test directory)"
              total_packages=$((total_packages + 1))
            fi
          done

          echo ""
          echo "✅ Test run completed!"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 SUMMARY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Total packages:   $total_packages"
          echo "Tested packages:  $tested_packages"
          echo "Ignored packages: $ignored_packages"

          if [ -n "$failed_packages" ]; then
            echo "❌ FAILED: $failed_packages"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          else
            echo "✅ All tests passed!"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          fi
        )

    test_coverage:
      description: Run tests with coverage in all packages (auto-detects Flutter vs Dart)
      run: |
        echo "🧪 Running coverage tests with auto-detection..."
        for package_dir in packages/*/; do
          package_name=$(basename "$package_dir")

          if [ -d "${package_dir}test" ]; then
            echo ""
            echo "📦 Testing $package_name..."
            cd "$package_dir"

            if grep -q "flutter:" pubspec.yaml; then
              echo "🦋 Flutter package detected - using flutter test"
              flutter test --coverage
            else
              echo "🎯 Dart package detected - using dart test"
              dart test --coverage=coverage
            fi
            cd - > /dev/null
          fi
        done
        echo "✅ Coverage generation completed for all packages!"

    coverage_merge:
      description: Merge coverage reports from all packages into coverage/html/
      run: |
        mkdir -p coverage
        rm -f coverage/lcov.info

        coverage_files=$(find . -path "./coverage" -prune -o -name "lcov.info" -path "*/packages/*/coverage/lcov.info" -print)

        if [ -n "$coverage_files" ]; then
          echo "Found coverage files:"
          echo "$coverage_files"

          for lcov_file in $coverage_files; do
            package_path=$(echo "$lcov_file" | sed 's|^\./||' | sed 's|/coverage/lcov\.info$||')

            echo "Processing coverage for $package_path..."

            temp_file="coverage/temp_$(echo "$package_path" | tr '/' '_').info"
            sed "s|SF:lib/|SF:${package_path}/lib/|g" "$lcov_file" > "$temp_file"

            if [ -f coverage/lcov.info ]; then
              lcov --add-tracefile coverage/lcov.info --add-tracefile "$temp_file" -o coverage/lcov.info
            else
              cp "$temp_file" coverage/lcov.info
            fi

            rm "$temp_file"
          done

          lcov --remove coverage/lcov.info \
            '*/lib/src/_app_settings_entry.dart' \
            -o coverage/lcov.info \
            --ignore-errors unused

          genhtml coverage/lcov.info -o coverage/html --ignore-errors source
          echo "✅ Merged packages coverage report: coverage/html/index.html"

          if [ -f coverage/html/index.html ]; then
            open coverage/html/index.html
          else
            echo "⚠️  HTML file wasn't created"
            lcov --summary coverage/lcov.info
          fi
        else
          echo "❌ No coverage files found. Run 'melos run test_coverage' first."
        fi

    # ─── PLUGINS ─────────────────────────────────────────────────────────────
    test_plugin:
      description: |
        Run tests and coverage for a single plugin.
        Usage: PRG=program_name melos test_plugin
        Example: PRG=startup_demo melos test_plugin
      run: |
        (
          if [ -z "$PRG" ]; then
            echo "❌ PRG is not set. Usage: PRG=program_name melos test_program"
            exit 1
          fi

          plugin_dir="plugins/$PRG"

          if [ ! -d "$plugin_dir" ]; then
            echo "❌ Plugin '$PRG' not found at $plugin_dir"
            exit 1
          fi

          if [ ! -d "${plugin_dir}/test" ]; then
            echo "❌ No test directory found in $plugin_dir"
            exit 1
          fi

          echo ""
          echo "🚀 Testing $PRG..."
          cd "$plugin_dir"
          flutter test --coverage
          cd - > /dev/null
          echo ""
          echo "✅ Done: $PRG"
        )

    test_plugins:
      description: |
        Run tests in all plugins sequentially (excludes widgetbook_workspace).
        Usage: melos test_plugins
        Fail-fast: STRICT=true melos test_plugins
      run: |
        (
          echo "🧪 Running plugin tests sequentially..."
          if [ "${STRICT}" = "true" ]; then
            echo "⚠️  STRICT mode — stopping on first failure"
          fi

          failed_plugins=""
          total_plugins=0
          tested_plugins=0

          for plugin_dir in plugins/*/; do
            plugin_name=$(basename "$plugin_dir")

            if [ -d "${plugin_dir}test" ]; then
              echo ""
              echo "🚀 Testing $plugin_name..."
              cd "$plugin_dir"
              total_plugins=$((total_plugins + 1))
              tested_plugins=$((tested_plugins + 1))

              if ! flutter test; then
                echo "❌ Tests failed in $plugin_name"
                cd - > /dev/null
                if [ "${STRICT}" = "true" ]; then
                  echo ""
                  echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                  echo "🛑 STRICT mode — stopping at $plugin_name"
                  echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                  exit 1
                fi
                if [ -z "$failed_plugins" ]; then
                  failed_plugins="$plugin_name"
                else
                  failed_plugins="$failed_plugins, $plugin_name"
                fi
              else
                cd - > /dev/null
              fi
            else
              echo "⏭️  Skipping $plugin_name (no test directory)"
              total_plugins=$((total_plugins + 1))
            fi
          done

          echo ""
          echo "✅ Test run completed!"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 SUMMARY"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Total plugins:   $total_plugins"
          echo "Tested plugins:  $tested_plugins"

          if [ -n "$failed_plugins" ]; then
            echo "❌ FAILED: $failed_plugins"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          else
            echo "✅ All plugins tests passed!"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          fi
        )

    test_plugin_coverage:
      description: Run tests with coverage in all plugins (excludes widgetbook_workspace)
      run: |
        echo "🧪 Running plugin coverage tests..."
        for plugin_dir in plugins/*/; do
          plugin_name=$(basename "$plugin_dir")

          if [ -d "${plugin_dir}test" ]; then
            echo ""
            echo "🚀 Testing $plugin_name..."
            cd "$plugin_dir"
            flutter test --coverage
            cd - > /dev/null
          else
            echo "⏭️  Skipping $plugin_name (no test directory)"
          fi
        done
        echo "✅ Coverage generation completed for all programs!"

    coverage_merge_plugins:
      description: Merge coverage reports from all plugins into coverage/programs_html/
      run: |
        mkdir -p coverage
        rm -f coverage/plugins_lcov.info

        coverage_files=$(find . -name "lcov.info" -path "*/plugins/*/coverage/lcov.info")

        if [ -n "$coverage_files" ]; then
          echo "Found plugin coverage files:"
          echo "$coverage_files"

          for lcov_file in $coverage_files; do
            plugin_path=$(echo "$lcov_file" | sed 's|^\./||' | sed 's|/coverage/lcov\.info$||')

            echo "Processing coverage for $plugin_path..."

            temp_file="coverage/temp_$(echo "$plugin_path" | tr '/' '_').info"
            sed "s|SF:lib/|SF:${plugin_path}/lib/|g" "$lcov_file" > "$temp_file"

            if [ -f coverage/plugins_lcov.info ]; then
              lcov --add-tracefile coverage/plugins_lcov.info --add-tracefile "$temp_file" -o coverage/plugins_lcov.info
            else
              cp "$temp_file" coverage/plugins_lcov.info
            fi

            rm "$temp_file"
          done

          genhtml coverage/plugins_lcov.info -o coverage/plugins_html --ignore-errors source
          echo "✅ Merged plugins coverage report: coverage/plugins_html/index.html"

          if [ -f coverage/plugins_html/index.html ]; then
            open coverage/plugins_html/index.html
          else
            echo "⚠️  HTML file wasn't created"
            lcov --summary coverage/plugins_lcov.info
          fi
        else
          echo "❌ No plugin coverage files found. Run 'melos run test_programs_coverage' first."
        fi
    # ─── PROGRAMS ─────────────────────────────────────────────────────────────

    test_program:
      description: |
        Run tests and coverage for a single program.
        Usage: PRG=program_name melos test_program
        Example: PRG=startup_demo melos test_program
      run: |
        (
          if [ -z "$PRG" ]; then
            echo "❌ PRG is not set. Usage: PRG=program_name melos test_program"
            exit 1
          fi

          program_dir="programs/$PRG"

          if [ ! -d "$program_dir" ]; then
            echo "❌ Program '$PRG' not found at $program_dir"
            exit 1
          fi

          if [ ! -d "${program_dir}/test" ]; then
            echo "❌ No test directory found in $program_dir"
            exit 1
          fi

          echo ""
          echo "🚀 Testing $PRG..."
          cd "$program_dir"
          flutter test --coverage
          cd - > /dev/null
          echo ""
          echo "✅ Done: $PRG"
        )

    test_programs:
      description: |
        Run tests in all programs sequentially (excludes widgetbook_workspace).
        Usage: melos test_programs
        Fail-fast: STRICT=true melos test_programs
      run: |
        (
          echo "🧪 Running program tests sequentially..."
          if [ "${STRICT}" = "true" ]; then
            echo "⚠️  STRICT mode — stopping on first failure"
          fi

          failed_programs=""
          total_programs=0
          tested_programs=0

          for program_dir in programs/*/; do
            program_name=$(basename "$program_dir")

            if [ -d "${program_dir}test" ]; then
              echo ""
              echo "🚀 Testing $program_name..."
              cd "$program_dir"
              total_programs=$((total_programs + 1))
              tested_programs=$((tested_programs + 1))

              if ! flutter test; then
                echo "❌ Tests failed in $program_name"
                cd - > /dev/null
                if [ "${STRICT}" = "true" ]; then
                  echo ""
                  echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                  echo "🛑 STRICT mode — stopping at $program_name"
                  echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                  exit 1
                fi
                if [ -z "$failed_programs" ]; then
                  failed_programs="$program_name"
                else
                  failed_programs="$failed_programs, $program_name"
                fi
