        echo "✅ Coverage generation completed for all programs!"

    coverage_merge_programs:
      description: Merge coverage reports from all programs into coverage/programs_html/
      run: |
        mkdir -p coverage
        rm -f coverage/programs_lcov.info

        coverage_files=$(find . -name "lcov.info" -path "*/programs/*/coverage/lcov.info")

        if [ -n "$coverage_files" ]; then
          echo "Found program coverage files:"
          echo "$coverage_files"

          for lcov_file in $coverage_files; do
            program_path=$(echo "$lcov_file" | sed 's|^\./||' | sed 's|/coverage/lcov\.info$||')

            echo "Processing coverage for $program_path..."

            temp_file="coverage/temp_$(echo "$program_path" | tr '/' '_').info"
            sed "s|SF:lib/|SF:${program_path}/lib/|g" "$lcov_file" > "$temp_file"

            if [ -f coverage/programs_lcov.info ]; then
